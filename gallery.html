<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Tagin Icons Showcase</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1200px;
            margin: auto;
            padding: 1.5rem;
        }

        input {
            width: 100%;
            padding: 0.6rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
            gap: 1rem;
        }

        .icon {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 0.6rem;
            text-align: center;
            cursor: pointer;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .icon span {
            display: block;
            font-size: 0.7rem;
            margin-top: 0.25rem;
            word-break: break-all;
            opacity: 0.75;
        }
    </style>
</head>
<body>
<h1>Tagin Icon Pack</h1>

<input id="search" placeholder="Search icons…" />

Click on an icon box to copy the icon name to your clip board
<div id="count"></div>
<div class="grid" id="grid"></div>

<script type="module" src="./gallery.js"></script>
</body>
</html>
